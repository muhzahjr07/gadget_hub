name: Build and Release React & .NET Application

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Zip frontend build
        run: |
          cd dist
          zip -r ../gadget_hub_frontend.zip .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadget_hub_frontend
          path: gadget_hub_frontend.zip

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Frontend Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-backend:
    name: Build .NET Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/TheGadgetHub.API.csproj

      - name: Publish API
        run: dotnet publish backend/TheGadgetHub.API.csproj -c Release -o publish

      - name: Zip backend build
        run: |
          cd publish
          zip -r ../gadget_hub_backend.zip .

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadget_hub_backend
          path: gadget_hub_backend.zip

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Pack NuGet Package
        run: dotnet pack backend/TheGadgetHub.API.csproj -c Release -o out

      - name: Push NuGet Package to GitHub Packages
        run: |
          dotnet nuget push out/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate

  release:
    name: Create GitHub Release
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: gadget_hub_frontend

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: gadget_hub_backend

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gadget_hub_frontend.zip
            gadget_hub_backend.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
